<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blogs | KreditSeva Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/blogs-admin.css" />
</head>
<body>

  <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
    <div class="sb-logo">Kredit<span>Seva</span> <small>Admin</small></div>
    <nav class="sb-nav">
      <a href="/admin/dashboard" class="sb-link">
        <i class="fa-solid fa-gauge-high"></i> Dashboard
      </a>
      <a href="/admin/blogs" class="sb-link">
        <i class="fa-solid fa-pen-nib"></i> Blogs
      </a>
      <a href="/admin/loan-applications" class="sb-link">
        <i class="fa-solid fa-file-invoice"></i> Loan Applications
      </a>
      <div class="sb-group">
        <button class="sb-link sb-toggle" id="reportsToggle">
          <span><i class="fa-solid fa-chart-bar"></i> Reports</span>
          <svg class="sb-toggle-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="sb-submenu">
          <a href="/admin/complete-leads" class="sb-sublink">
            <i class="fa-solid fa-circle-check"></i> Complete Leads
          </a>
          <a href="/admin/raw-leads" class="sb-sublink">
            <i class="fa-solid fa-circle-half-stroke"></i> Raw Leads
          </a>
        </div>
      </div>
    </nav>
    <a href="/admin/logout" class="sb-logout" id="logoutBtn" style="text-decoration:none;">
      <i class="fa-solid fa-right-from-bracket"></i> Logout
    </a>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Topbar -->
    <header class="topbar">
      <button class="topbar-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
      <div class="topbar-title">Blogs</div>
      <div class="topbar-admin">
        <div class="topbar-avatar" id="adminAvatar">A</div>
        <div class="topbar-info">
          <span class="topbar-name" id="adminName">Karan</span>
          <span class="topbar-role" id="adminRole">Super Admin</span>
        </div>
      </div>
    </header>

    <!-- Content -->
    <div class="content">

      <!-- Page header -->
      <div class="page-head">
        <div>
          <h2 class="welcome-title">All Blogs</h2>
          <p class="welcome-sub">Create, edit and manage all blog posts.</p>
        </div>
        <a href="/admin/blog-editor" class="btn-primary">
          <i class="fa-solid fa-plus"></i> New Blog
        </a>
      </div>

      <!-- Filters bar -->
      <div class="card">
        <div class="filter-bar">
          <div class="search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Search blogs..." />
          </div>
          <select id="catFilter">
            <option value="all">All Categories</option>
            <option value="personal-loan">Personal Loan</option>
            <option value="business-loan">Business Loan</option>
            <option value="professional-loan">Professional Loan</option>
            <option value="secured-loan">Secured Loan</option>
            <option value="credit-score">Credit Score</option>
            <option value="investment">Investment</option>
          </select>
          <select id="statusFilter">
            <option value="all">All Status</option>
            <option value="published">Published</option>
            <option value="draft">Draft</option>
          </select>
        </div>
      </div>

      <!-- Table -->
      <div class="card">
        <div class="table-wrap">
          <table class="tbl">
            <thead>
              <tr>
                <th>#</th>
                <th>Title</th>
                <th>Category</th>
                <th>Author</th>
                <th>Date</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="blogTableBody">
              <!-- JS se fill hoga -->
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
      </div>

    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <div class="modal-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
      <h3>Delete Blog?</h3>
      <p>Yeh action undo nahi hogi. Kya aap sure hain?</p>
      <div class="modal-actions">
        <button class="btn-ghost" id="cancelDelete">Cancel</button>
        <button class="btn-danger" id="confirmDelete">Haan, Delete Karo</button>
      </div>
    </div>
  </div>

  <div class="sb-overlay" id="sbOverlay"></div>
  <script src="js/check-auth.js"></script>
  <script src="js/blogs.js"></script>
</body>
</html>
