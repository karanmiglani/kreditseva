<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raw Leads | KreditSeva Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

    <aside class="sidebar" id="sidebar">
    <div class="sb-logo">Kredit<span>Seva</span> <small>Admin</small></div>
    <nav class="sb-nav">
      <a href="/admin/dashboard" class="sb-link">
        <i class="fa-solid fa-gauge-high"></i> Dashboard
      </a>
      <a href="/admin/blogs" class="sb-link">
        <i class="fa-solid fa-pen-nib"></i> Blogs
      </a>
      <a href="/admin/loan-applications" class="sb-link">
        <i class="fa-solid fa-file-invoice"></i> Loan Applications
      </a>
      <a href="/admin/contact-messages" class="sb-link">
        <i class="fa-solid fa-envelope"></i> Contact Messages
      </a>
      <a href="/admin/partner-leads" class="sb-link">
        <i class="fa-solid fa-handshake"></i> Partner Leads
      </a>
      <div class="sb-group">
        <button class="sb-link sb-toggle" id="reportsToggle">
          <span><i class="fa-solid fa-chart-bar"></i> Reports</span>
          <svg class="sb-toggle-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="sb-submenu">
          <a href="/admin/complete-leads" class="sb-sublink">
            <i class="fa-solid fa-circle-check"></i> Complete Leads
          </a>
          <a href="/admin/raw-leads" class="sb-sublink">
            <i class="fa-solid fa-circle-half-stroke"></i> Raw Leads
          </a>
        </div>
      </div>
    </nav>
    <a href="/admin/logout" class="sb-logout" id="logoutBtn" style="text-decoration:none;">
      <i class="fa-solid fa-right-from-bracket"></i> Logout
    </a>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="topbar-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
      <div class="topbar-title">Raw Leads</div>
      <div class="topbar-admin">
        <div class="topbar-avatar" id="adminAvatar">A</div>
        <div class="topbar-info">
          <span class="topbar-name" id="adminName">Admin</span>
          <span class="topbar-role">Super Admin</span>
        </div>
      </div>
    </header>

    <div class="content">
      <div class="welcome">
        <div>
          <h2 class="welcome-title">Raw Leads</h2>
          <p class="welcome-sub">Download phone numbers captured before full form submission.</p>
        </div>
      </div>

      <div class="card" style="max-width:500px;">
        <div class="card-header">
          <h3 class="card-title">Select Date Range</h3>
        </div>
        <div style="padding:24px;display:flex;flex-wrap:wrap;align-items:flex-end;gap:14px;">
          <div style="display:flex;flex-direction:column;gap:6px;">
            <label style="font-size:0.82rem;font-weight:700;color:#0d1547;">From</label>
            <input type="date" id="dateFrom" style="border:1.5px solid #e2eaf8;border-radius:8px;padding:10px 14px;font-size:0.88rem;font-family:'Open Sans',sans-serif;font-weight:600;color:#0d1547;outline:none;" />
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;">
            <label style="font-size:0.82rem;font-weight:700;color:#0d1547;">To</label>
            <input type="date" id="dateTo" style="border:1.5px solid #e2eaf8;border-radius:8px;padding:10px 14px;font-size:0.88rem;font-family:'Open Sans',sans-serif;font-weight:600;color:#0d1547;outline:none;" />
          </div>
          <button id="downloadBtn" style="display:flex;align-items:center;gap:10px;padding:10px 20px;background:#1a52cc;color:#fff;border:none;border-radius:8px;font-size:0.88rem;font-weight:700;font-family:'Open Sans',sans-serif;cursor:pointer;transition:all 0.2s;">
            <i class="fa-solid fa-download"></i> Download Excel
          </button>
          <span id="downloadMsg" style="font-size:0.8rem;color:#ef4444;font-weight:600;display:none;text-align:center;"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="sb-overlay" id="sbOverlay"></div>

  <script src="js/check-auth.js"></script>
  <script>
  (function () {
    const adminName = localStorage.getItem('admin-name') || 'Admin';
    document.getElementById('adminAvatar').textContent = adminName.charAt(0).toUpperCase();
    document.getElementById('adminName').textContent   = adminName;

    const today = new Date().toISOString().split('T')[0];
    document.getElementById('dateFrom').value = today;
    document.getElementById('dateTo').value   = today;

    document.getElementById('downloadBtn').addEventListener('click', () => {
      const from = document.getElementById('dateFrom').value;
      const to   = document.getElementById('dateTo').value;
      const msg  = document.getElementById('downloadMsg');
      if (!from || !to) { msg.textContent = 'Please select both dates.'; msg.style.display = 'block'; return; }
      if (from > to)    { msg.textContent = 'From date cannot be after To date.'; msg.style.display = 'block'; return; }
      msg.style.display = 'none';
      window.location.href = `${window.location.origin}/api/dashboard/raw-leads/download?from=${from}&to=${to}`;
    });

    // Active sidebar link
    const path = window.location.pathname;
    document.querySelectorAll('.sb-link, .sb-sublink').forEach(link => {
      if (link.getAttribute('href') === path) {
        link.classList.add('active');
        const group = link.closest('.sb-group');
        if (group) group.classList.add('open');
      }
    });

    document.getElementById('reportsToggle')?.addEventListener('click', () => {
      document.getElementById('reportsToggle').closest('.sb-group').classList.toggle('open');
    });

    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sbOverlay');
    document.getElementById('sidebarToggle')?.addEventListener('click', () => {
      sidebar?.classList.toggle('open'); overlay?.classList.toggle('open');
    });
    overlay?.addEventListener('click', () => {
      sidebar?.classList.remove('open'); overlay?.classList.remove('open');
    });
  })();
  </script>
</body>
</html>
