<div class="ks-popup-overlay" id="loanPopup">
  <div class="ks-popup-modal">

    <button class="ks-popup-close" id="closeLoanPopup" type="button">&times;</button>

    <div class="ks-popup-header">
      <h2>Apply for Loan</h2>
      <p>Fill your details and our team will contact you shortly.</p>
    </div>

    <form id="loanApplicationForm" novalidate>

      <div class="ks-form-grid">

        <!-- NAME -->
        <div class="ks-field">
          <label for="popupFullName">Full Name *</label>
          <input
            type="text"
            id="popupFullName"
            placeholder="Enter your full name"
          >
          <span class="ks-error"></span>
        </div>

        <!-- PHONE -->
        <div class="ks-field">
          <label for="popupPhoneNumber">Phone Number *</label>
          <input
            type="tel"
            id="popupPhoneNumber"
            maxlength="10"
            placeholder="Enter 10 digit mobile number"
          >
          <span class="ks-error"></span>
        </div>

        <!-- EMAIL -->
        <div class="ks-field">
          <label for="popupEmailAddress">Email Address *</label>
          <input
            type="email"
            id="popupEmailAddress"
            placeholder="Enter your email"
          >
          <span class="ks-error"></span>
        </div>

        <!-- CITY -->
        <div class="ks-field">
          <label for="popupCity">City *</label>
          <input
            type="text"
            id="popupCity"
            placeholder="Enter your city"
          >
          <span class="ks-error"></span>
        </div>

        <!-- OCCUPATION -->
        <div class="ks-field">
          <label for="popupOccupation">Occupation *</label>
          <select id="popupOccupation">
            <option value="">Select Occupation</option>
            <option value="Salaried">Salaried</option>
            <option value="Self Employed">Self Employed</option>
            <option value="Business Owner">Business Owner</option>
            <option value="Professional">Professional</option>
            <option value="Freelancer">Freelancer</option>
          </select>
          <span class="ks-error"></span>
        </div>

        <!-- MONTHLY INCOME -->
        <div class="ks-field">
          <label for="popupIncome">Monthly Income *</label>
          <select id="popupIncome">
            <option value="">Select Monthly Income</option>
            <option value="Below 25000">Below ₹25,000</option>
            <option value="25000-50000">₹25,000 - ₹50,000</option>
            <option value="50000-100000">₹50,000 - ₹1 Lakh</option>
            <option value="100000-300000">₹1 Lakh - ₹3 Lakh</option>
            <option value="300000-500000">₹3 Lakh - ₹5 Lakh</option>
            <option value="500000+">Above ₹5 Lakh</option>
          </select>
          <span class="ks-error"></span>
        </div>

        <!-- LOAN AMOUNT -->
        <div class="ks-field">
          <label for="popupLoanAmount">Loan Amount *</label>
          <input
            type="text"
            id="popupLoanAmount"
            placeholder="Enter required loan amount"
          >
          <span class="ks-error"></span>
        </div>

        <!-- PAN -->
        <div class="ks-field">
          <label for="popupPanCard">PAN Card (Optional)</label>
          <input
            type="text"
            id="popupPanCard"
            maxlength="10"
            placeholder="ABCDE1234F"
          >
          <span class="ks-error"></span>
        </div>

        <!-- PINCODE -->
        <div class="ks-field">
          <label for="popupPinCode">Pin Code *</label>
          <input
            type="text"
            id="popupPinCode"
            maxlength="6"
            placeholder="Enter pincode"
          >
          <span class="ks-error"></span>
        </div>

        <!-- PRODUCT TYPE -->
        <div class="ks-field">
          <label for="popupProductType">Product Type *</label>
          <select id="popupProductType">
            <option value="">Select Product</option>
            <option value="Personal Loan">Personal Loan</option>
            <option value="Business Loan">Business Loan</option>
            <option value="Professional Loan">Professional Loan</option>
            <option value="Home Loan">Home Loan</option>
            <option value="Car Loan">Car Loan</option>
            <option value="Loan Against Property">Loan Against Property</option>
            <option value="Credit Card">Credit Card</option>
          </select>
          <span class="ks-error"></span>
        </div>

      </div>

      <div class="ks-success-message" id="successMessage">
        Application submitted successfully! Our team will contact you shortly.
      </div>

      <button type="submit" class="ks-submit-btn">
        Submit Application
      </button>

    </form>

  </div>
</div>
